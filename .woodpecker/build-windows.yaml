# Windows release build pipeline.
# Runs on pushes to master/development (-> nightly release) and on
# v*.*.* tags (-> versioned release).
#
# Trust tier: trusted. Has access to GITHUB_RELEASE_TOKEN.
# Runs on a self-hosted Windows agent using Woodpecker's *local* backend
# (no Docker). On the local backend the `image` field names the shell
# used to run the commands, not a container image. The agent must have
# Python 3.12, git, and Inno Setup pre-installed; see doc/designs/ci.md.

when:
  - event: push
    branch: [master, development]
  - event: tag
    ref: refs/tags/v*.*.*

labels:
  backend: local
  os: windows
  platform: windows/amd64

steps:
  - name: install-deps
    image: powershell
    commands:
      - python build.py --install-deps

  - name: build
    image: powershell
    commands:
      - python build.py --release --installer
    depends_on:
      - install-deps

  - name: upload
    image: powershell
    environment:
      GITHUB_RELEASE_TOKEN:
        from_secret: github_release_token
    commands:
      - |
        if ($env:CI_COMMIT_TAG) { $TAG = $env:CI_COMMIT_TAG } else { $TAG = "nightly" }
        # Installers land in build\release-<timestamp>\ (see build.py).
        python scripts/release_upload.py --repo lyjia/yaamt --tag $TAG (Get-ChildItem build\release-*\*-setup.exe).FullName
    depends_on:
      - build
