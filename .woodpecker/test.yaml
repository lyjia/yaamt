# Lint and test pipeline.
# Linux-only by design - tests are platform-agnostic and we want fast
# feedback.
#
# Pushing to a branch with an open PR fires BOTH a push and a
# pull_request webhook; matching both would run this pipeline twice
# per push. Dedup: PR events always run; push events only on the
# long-lived branches (which never have PRs from themselves). A push
# to a feature branch with no open PR runs nothing - CI starts when
# the PR is opened.
#
# Each step runs in its own container; only the workspace persists
# between steps. Steps must therefore be self-contained (install what
# they need themselves) - dependencies installed in one step do not
# exist in the next.
#
# Trust tier: untrusted (fork PRs run here after maintainer approval).
# Must not depend on any secret. See doc/designs/ci.md.

when:
  - event: pull_request
  - event: push
    branch: [master, development]

# The references/ submodules are reference material only - tests and
# builds never touch them. Skip the recursive clone.
clone:
  - name: clone
    image: woodpecker/plugin-git
    settings:
      recursive: false

labels:
  platform: linux/amd64

steps:
  - name: lint
    image: python:3.12
    commands:
      - pip install flake8
      # Hard-fail on syntax / undefined-name errors only.
      - flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
      # Soft-warn on everything else.
      - flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  - name: test
    image: python:3.12
    environment:
      QT_QPA_PLATFORM: offscreen
      GITHUB_ACTIONS: "true"   # used by tests to skip Qt-widget cases
      DEBIAN_FRONTEND: noninteractive
    commands:
      - python build.py --install-deps
      - pytest
