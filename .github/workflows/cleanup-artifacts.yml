name: Cleanup Artifacts
# DISABLED: Workflow temporarily disabled to conserve GitHub Actions minutes
# To re-enable, uncomment the 'on:' section below
#on:
#  schedule:
#    - cron: '0 0 * * *'  # Mondays at midnight
#  workflow_dispatch:  # Manual trigger

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete old artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const retentionInDays = 7;
            
            // Get all artifacts
            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner,
              repo,
              per_page: 100
            });
            
            // Delete artifacts older than `retentionInDays` days
            const cutoffDate = new Date();
            cutoffDate.setDate(cutoffDate.getDate() - retentionInDays);
            
            for (const artifact of artifacts.data.artifacts) {
              const createdAt = new Date(artifact.created_at);
              if (createdAt < cutoffDate) {
                console.log(`Deleting ${artifact.name} from ${artifact.created_at}`);
                await github.rest.actions.deleteArtifact({
                  owner,
                  repo,
                  artifact_id: artifact.id
                });
              }
            }