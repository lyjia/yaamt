# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  push:
    branches: [ "master", "development" ]
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  pull_request:
    branches: [ "master", "development" ]

permissions:
  contents: read


jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - uses: ./.github/actions/setup-deps
    - name: Install test dependencies
      run: |
        pip install flake8 pytest
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
#    - name: Test with pytest (in xvfb)
#      run: |
#        xvfb-run -a pytest
    - name: Test with pytest (no xvfb)
      run: |
        pytest

  # Build and release are done locally, not in CI.
  # Build artifacts (~700MB) are too large for GitHub Actions storage (500MB free plan).
  #
  # To build and release manually:
  #   python build.py --release --archive
  #   python build.py --release --installer   (Windows, requires Inno Setup)
  #
  # Then create a GitHub Release and attach the archive/installer manually.
