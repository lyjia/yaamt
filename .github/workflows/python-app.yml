# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  push:
    branches: [ "master", "development" ]
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  pull_request:
    branches: [ "master", "development" ]

permissions:
  contents: read


jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v3
      with:
        python-version: "3.12"
    - uses: ./.github/actions/setup-deps
    - name: Install test dependencies
      run: |
        pip install flake8 pytest
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
#    - name: Test with pytest (in xvfb)
#      run: |
#        xvfb-run -a pytest
    - name: Test with pytest (no xvfb)
      run: |
        pytest

  build:
    needs: test
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
          - os: ubuntu-latest
            arch: arm64
          - os: windows-latest
            arch: x64
          - os: macos-latest # x64 runner
            arch: x64
          - os: macos-14 # arm64 runner for Apple Silicon
            arch: arm64
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Set up QEMU
      if: matrix.arch == 'arm64' && startsWith(matrix.os, 'ubuntu')
      uses: docker/setup-qemu-action@v3

    - name: Create Release
      id: create_release
      if: ${{ startsWith(github.ref, 'refs/tags/') }}
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref_name }}
        release_name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false

    - uses: ./.github/actions/setup-deps

    - name: Install build dependencies
      run: |
        pip install cx_freeze nuitka ordered-set zstandard

    - name: Install Nuitka system dependencies (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        choco install ccache

    - name: Install Nuitka system dependencies (macOS)
      if: startsWith(matrix.os, 'macos')
      run: |
        brew install ccache

    - name: Install Nuitka system dependencies (Linux)
      if: startsWith(matrix.os, 'ubuntu')
      run: |
        sudo apt-get install -y ccache patchelf

    - name: Build with Nuitka (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        mkdir -p build/nuitka-dist
        python -m nuitka --mingw64 --assume-yes-for-downloads --onefile --standalone src/main.py --output-dir=build/nuitka-dist
        python -m nuitka --mingw64 --assume-yes-for-downloads --onefile --standalone --plugin-enable=pyside6 --include-module=cffi --follow-imports src/gui.py --output-dir=build/nuitka-dist

    - name: Build with Nuitka (Linux)
      if: startsWith(matrix.os, 'ubuntu')
      run: |
        mkdir -p build/nuitka-dist
        nuitka --standalone --onefile src/main.py --output-dir=build/nuitka-dist
        nuitka --onefile --standalone --plugin-enable=pyside6 --include-module=cffi --follow-imports src/gui.py --output-dir=build/nuitka-dist

    - name: Build with cx_Freeze (macOS only, Nuitka not working yet)
      if: startsWith(matrix.os, 'macos')
      run: python setup.py build

    - name: Determine Build Path and Archive Name
      id: build_info
      shell: bash
      run: |
        # For Nuitka builds (Windows/Linux), use nuitka-dist directory
        # For cx_freeze builds (macOS), use exe.* directory
        if [[ "${{ matrix.os }}" == "macos-latest" ]] || [[ "${{ matrix.os }}" == "macos-14" ]]; then
          BUILD_DIR=$(find build -maxdepth 1 -type d -name 'exe.*' -print -quit)
        else
          BUILD_DIR="build/nuitka-dist"
        fi

        if [[ -z "$BUILD_DIR" ]] || [[ ! -d "$BUILD_DIR" ]]; then
          echo "Build directory not found!"
          exit 1
        fi
        echo "BUILD_DIR=$BUILD_DIR" >> $GITHUB_OUTPUT

        ref_name="${{ github.ref_name }}"
        ref_name_sanitized="${ref_name//\//-}"

        if [[ "${{ startsWith(github.ref, 'refs/tags/') }}" == "true" ]]; then
          VERSION_NAME="$ref_name_sanitized"
        else
          VERSION_NAME="$ref_name_sanitized-${{ github.sha }}"
        fi

        if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
          ARCHIVE_NAME="yaamt-$VERSION_NAME-${{ matrix.os }}-${{ matrix.arch }}.zip"
          echo "ASSET_CONTENT_TYPE=application/zip" >> $GITHUB_OUTPUT
        else
          ARCHIVE_NAME="yaamt-$VERSION_NAME-${{ matrix.os }}-${{ matrix.arch }}.tar.gz"
          echo "ASSET_CONTENT_TYPE=application/gzip" >> $GITHUB_OUTPUT
        fi
        echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> $GITHUB_OUTPUT

    - name: Archive Build Artifacts (Windows)
      if: matrix.os == 'windows-latest'
      shell: powershell
      run: |
        cd ${{ steps.build_info.outputs.BUILD_DIR }}
        Compress-Archive -Path * -DestinationPath ${{ github.workspace }}/${{ steps.build_info.outputs.ARCHIVE_NAME }}

    - name: Archive Build Artifacts (Linux/macOS)
      if: matrix.os != 'windows-latest'
      shell: bash
      run: tar czf ${{ steps.build_info.outputs.ARCHIVE_NAME }} -C ${{ steps.build_info.outputs.BUILD_DIR }} .

    - name: Upload Build Artifact
      if: ${{ !startsWith(github.ref, 'refs/tags/') }}
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.build_info.outputs.ARCHIVE_NAME }}
        path: ${{ steps.build_info.outputs.ARCHIVE_NAME }}

    - name: Upload Release Asset
      if: ${{ startsWith(github.ref, 'refs/tags/') }}
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./${{ steps.build_info.outputs.ARCHIVE_NAME }}
        asset_name: ${{ steps.build_info.outputs.ARCHIVE_NAME }}
        asset_content_type: ${{ steps.build_info.outputs.ASSET_CONTENT_TYPE }}

