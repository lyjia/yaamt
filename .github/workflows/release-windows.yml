# Manually-triggered Windows release build.
#
# This is NOT automatic CI. It fires only when a maintainer clicks
# "Run workflow" (workflow_dispatch) and names a tag. Automatic CI
# (lint + test) still lives exclusively on Woodpecker; see
# doc/designs/ci.md. This workflow exists for the interim period where
# no self-hosted Windows agent is provisioned (doc/RELEASING.md, Scenario 4).
#
# It builds the installer (.exe) from a chosen tag and uploads it straight
# to the matching GitHub Release. The artifact is a *release asset*, not an
# Actions artifact, so the 500 MB Actions storage cap that drove CI to
# Woodpecker does not apply here.
#
# Cost: standard GitHub-hosted runners are free and unlimited for public
# repositories. A run is a single ~10-minute Windows build.
name: Release (Windows)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build (e.g. v0.1.0). Must already exist and be pushed."
        required: true
        type: string

permissions:
  contents: write   # lets the built-in GITHUB_TOKEN create/edit the release

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Check out the tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
          # Full history + tags: version.py runs `git describe --tags --long`
          # to stamp the build, which needs the release tags and the commit
          # graph back to them. A shallow clone would mis-stamp the version.
          fetch-depth: 0
          submodules: false   # references/ is reference material only

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify the checkout is exactly on the tag
        # Guard against publishing a non-release build: if a branch (not a
        # tag) was passed, the version carries a '+N.hash' suffix and we stop.
        shell: pwsh
        run: |
          $ver = & { Set-Location src; python -m util.version }
          Write-Host "Build will stamp version: $ver"
          if ($ver -match '\+' -or $ver -match 'dirty') {
            Write-Error "Version '$ver' is not a clean release build (contains '+' or 'dirty'). Pass a release tag, not a branch."
            exit 1
          }

      - name: Install dependencies
        shell: pwsh
        run: |
          python build.py --install-deps
          # --install-deps installs ccache but not the installer tool; the
          # build's --installer step needs Inno Setup's ISCC.exe. Install it
          # explicitly rather than relying on the runner image shipping it.
          choco install innosetup -y --no-progress

      - name: Build release and installer
        shell: pwsh
        run: python build.py --release --installer

      - name: Upload installer to the GitHub Release
        shell: pwsh
        env:
          GITHUB_RELEASE_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $exe = (Get-ChildItem build\release-*\*-setup.exe).FullName
          python scripts/release_upload.py --repo "${{ github.repository }}" --tag "${{ inputs.tag }}" $exe